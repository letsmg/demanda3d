services:
  # =============================================
  # PostgreSQL Master (Primary) - PROD
  # =============================================
  demanda-psql-prod:
    image: postgres:18.4-alpine
    container_name: demanda-psql-prod
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5436:5432"
    volumes:
      - demanda-psql-prod:/var/lib/postgresql
      - ./docker/psql/00-init-master.sh:/docker-entrypoint-initdb.d/00-init-master.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - demanda-net-prod

  # =============================================
  # PostgreSQL Replica (Hot Standby) - PROD
  #
  # NÃO usa docker-entrypoint-initdb.d — usa entrypoint customizado.
  # Motivo: scripts de initdb.d rodam enquanto um Postgres temporário
  # já está ativo em $PGDATA, causando corrupção ao tentar fazer
  # pg_basebackup no mesmo diretório. Ver entrypoint-replica.sh.
  # =============================================
  demanda-psql-rep-prod:
    image: postgres:18.4-alpine
    container_name: demanda-psql-rep-prod
    restart: unless-stopped
    env_file:
      - .env.docker
    entrypoint: ["/entrypoint-replica.sh"]
    ports:
      - "5437:5432"
    volumes:
      - demanda-psql-rep-prod:/var/lib/postgresql
      - ./docker/psql-rep/entrypoint-replica.sh:/entrypoint-replica.sh:ro
    depends_on:
      demanda-psql-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - demanda-net-prod

  # =============================================
  # Redis - PROD
  # =============================================
  demanda-redis-prod:
    image: redis:8.0-alpine
    container_name: demanda-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - demanda-redis-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - demanda-net-prod

networks:
  demanda-net-prod:
    name: demanda-net-prod
    driver: bridge

volumes:
  demanda-psql-prod:
    name: demanda-psql-prod
  demanda-psql-rep-prod:
    name: demanda-psql-rep-prod
  demanda-redis-prod:
    name: demanda-redis-prod
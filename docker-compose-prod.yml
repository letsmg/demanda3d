services:
  # =============================================
  # PostgreSQL Master (Primary) - PROD
  # =============================================
  prod-demanda-psql:
    image: postgres:18.4-alpine
    container_name: prod-demanda-psql
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5436:5432"
    volumes:
      - prod_psql_data:/var/lib/postgresql
      - ./docker/psql/00-init-master.sh:/docker-entrypoint-initdb.d/00-init-master.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - prod-demanda-net

  # =============================================
  # PostgreSQL Slave (Replica) - PROD
  # =============================================
  prod-demanda-psql-rep:
    image: postgres:18.4-alpine
    container_name: prod-demanda-psql-rep
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5437:5432"
    volumes:
      - prod_psql_rep_data:/var/lib/postgresql
      - ./docker/psql-rep/init-replica.sh:/docker-entrypoint-initdb.d/00-init-replica.sh:ro
    depends_on:
      prod-demanda-psql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - prod-demanda-net

  # =============================================
  # Redis - PROD
  # =============================================
  prod-demanda-redis:
    image: redis:8.0-alpine
    container_name: prod-demanda-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prod-demanda-net

networks:
  prod-demanda-net:
    name: prod-demanda-net
    driver: bridge

volumes:
  prod_psql_data:
    name: prod_psql_data
  prod_psql_rep_data:
    name: prod_psql_rep_data
  prod_redis_data:
    name: prod_redis_data

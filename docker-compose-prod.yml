services:
  # =============================================
  # PostgreSQL Master (Primary) - PROD
  # =============================================
  prod-demanda-psql:
    image: postgres:18.4-alpine
    container_name: prod-demanda-psql
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_INITDB_ARGS: "--locale=en_US.utf8 --data-checksums"
    ports:
      - "5436:5432"
    volumes:
      - prod_demanda_psql_data:/var/lib/postgresql
      - ./docker/psql/01-init-master.sh:/docker-entrypoint-initdb.d/00-init-master.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - prod-demanda-net

  # =============================================
  # PostgreSQL Slave (Replica) - PROD
  # =============================================
  prod-demanda-psql-rep:
    image: postgres:18.4-alpine
    container_name: prod-demanda-psql-rep
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5437:5432"
    volumes:
      - prod_demanda_psql_rep_data:/var/lib/postgresql
      - ./docker/psql-rep/init-replica.sh:/docker-entrypoint-initdb.d/00-init-replica.sh
    depends_on:
      prod-demanda-psql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${REPL_USER:-$${POSTGRES_USER}}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - prod-demanda-net

  # =============================================
  # Redis - PROD
  # =============================================
  prod-demanda-redis:
    image: redis:8.0-alpine
    container_name: prod-demanda-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    volumes:
      - prod_demanda_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prod-demanda-net

volumes:
  prod_demanda_psql_data:
    name: prod_demanda_psql_data
    external: true
  prod_demanda_psql_rep_data:
    name: prod_demanda_psql_rep_data
    external: true
  prod_demanda_redis_data:
    name: prod_demanda_redis_data
    external: true

networks:
  prod-demanda-net:
    name: prod-demanda-net
    driver: bridge
    external: true
services:
  # =============================================
  # PostgreSQL Master (Primary) - HOM
  # =============================================
  demanda-psql-hom:
    image: postgres:18.4-alpine
    container_name: demanda-psql-hom
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_INITDB_ARGS: "--locale=en_US.utf8 --data-checksums"
    ports:
      - "5438:5432"
    volumes:
      - demanda_psql_hom_data:/var/lib/postgresql
      - ./docker/psql/init-master.sh:/docker-entrypoint-initdb.d/00-init-master.sh
      - ./docker/psql/init-replication-config.sh:/docker-entrypoint-initdb.d/01-replication-config.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demanda_user -d demanda_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - demanda-net-hom

  # =============================================
  # PostgreSQL Slave (Replica) - HOM
  # =============================================
  demanda-psql-rep-hom:
    image: postgres:18.4-alpine
    container_name: demanda-psql-rep-hom
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5439:5432"
    volumes:
      - demanda_psql_rep_hom_data:/var/lib/postgresql
      - ./docker/psql-rep/init-replica.sh:/docker-entrypoint-initdb.d/00-init-replica.sh
    depends_on:
      demanda-psql-hom:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demanda_user"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - demanda-net-hom

  # =============================================
  # Redis - HOM
  # =============================================
  demanda-redis-hom:
    image: redis:8.0-alpine
    container_name: demanda-redis-hom
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    volumes:
      - demanda_redis_hom_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - demanda-net-hom

volumes:
  demanda_psql_hom_data:
    name: demanda_psql_hom_data
    external: true
  demanda_psql_rep_hom_data:
    name: demanda_psql_rep_hom_data
    external: true
  demanda_redis_hom_data:
    name: demanda_redis_hom_data
    external: true

networks:
  demanda-net-hom:
    name: demanda-net-hom
    driver: bridge
    external: true
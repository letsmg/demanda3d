services:
  # =============================================
  # PostgreSQL Master (Primary) - HOM
  # =============================================
  demanda-psql-hom:
    image: postgres:18.4-alpine
    container_name: demanda-psql-hom
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5438:5432"
    volumes:
      - hom_psql_data:/var/lib/postgresql
      - ./docker/psql/00-init-master.sh:/docker-entrypoint-initdb.d/00-init-master.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - hom-demanda-net

  # =============================================
  # PostgreSQL Slave (Replica) - HOM
  # =============================================
  demanda-psql-rep-hom:
    image: postgres:18.4-alpine
    container_name: demanda-psql-rep-hom
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5439:5432"
    volumes:
      - hom_psql_rep_data:/var/lib/postgresql
      - ./docker/psql-rep/init-replica.sh:/docker-entrypoint-initdb.d/00-init-replica.sh:ro
    depends_on:
      demanda-psql-hom:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - hom-demanda-net

  # =============================================
  # Redis - HOM
  # =============================================
  demanda-redis-hom:
    image: redis:8.0-alpine
    container_name: demanda-redis-hom
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    volumes:
      - hom_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hom-demanda-net

networks:
  hom-demanda-net:
    name: hom-demanda-net
    driver: bridge

volumes:
  hom_psql_data:
    name: hom_psql_data
  hom_psql_rep_data:
    name: hom_psql_rep_data
  hom_redis_data:
    name: hom_redis_data

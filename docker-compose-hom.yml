services:
  # =============================================
  # PostgreSQL Master (Primary) - HOM
  # =============================================
  demanda-psql-hom:
    image: postgres:18.4-alpine
    container_name: demanda-psql-hom
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5438:5432"
    volumes:
      - demanda-psql-hom:/var/lib/postgresql/data
      - ./docker/psql/00-init-master.sh:/docker-entrypoint-initdb.d/00-init-master.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - demanda-net-hom

  # =============================================
  # Redis - HOM
  # =============================================
  demanda-redis-hom:
    image: redis:8.0-alpine
    container_name: demanda-redis-hom
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    volumes:
      - demanda-redis-hom:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - demanda-net-hom

        # =============================================
  # Go Notification Service — Microsserviço Assíncrono
  #
  # Worker em Go que escuta a fila notifications_queue
  # no Redis e processa disparos de push, e-mail e SMS.
  # Alivia o core Laravel de processamento síncrono.
  # Container ultra-leve (~8MB binário compilado).
  # =============================================
  
  # =============================================
  # Go Notification Service — Microsserviço Assíncrono
  # =============================================
  go-notification-service:
    build:
      context: . # Ajuste o caminho do context se o Dockerfile estiver em uma subpasta (ex: ./go-notification)
      dockerfile: Dockerfile
    image: go-notification-service:latest 
    container_name: go-notification-service-hom
    restart: unless-stopped
    environment:
      REDIS_HOST: demanda-redis-hom
      REDIS_PORT: "6379"
      NOTIFICATIONS_QUEUE: notifications_queue
    depends_on:
      demanda-redis-hom:
        condition: service_healthy
    networks:
      - demanda-net-hom

networks:
  demanda-net-hom:
    name: demanda-net-hom
    driver: bridge

volumes:
  demanda-psql-hom:
    name: demanda-psql-hom
  demanda-redis-hom:
    name: demanda-redis-hom
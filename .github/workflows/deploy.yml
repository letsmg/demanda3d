name: 🚀 Deploy Demanda3D

on:
  push:
    branches: [main, dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, pdo_pgsql, redis

      - name: 🟢 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 🔨 Build Assets & Deps
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: 🤐 Criar Pacote de Deploy
        run: |
          zip -r deploy.zip . -x ".git/*" ".github/*" "node_modules/*" "tests/*" ".env*" "storage/framework/*" "storage/logs/*"

      - name: 🔑 Configure SSH
        run: |
          mkdir -p ~/.ssh
          # Ajuste para evitar bloqueio por alteração de chave
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 🚀 Executar Deploy Atômico
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_NAME="demanda3d"
            ROOT="/var/www/demanda3d"
            CONTAINER_NAME="demanda-psql-prod"
          else
            PROJECT_NAME="dev-demanda3d"
            ROOT="/var/www/dev-demanda3d"
            CONTAINER_NAME="demanda-psql-dev"
          fi

          scp -o StrictHostKeyChecking=accept-new deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ secrets.SERVER_IP }} \
          "PROJECT_NAME=$PROJECT_NAME ROOT=$ROOT CONTAINER_NAME=$CONTAINER_NAME bash -s" << 'EOF'
            set -e
            
            # 1. Validação do Container
            if ! docker ps --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}$"; then
              echo "❌ ERRO: Container '$CONTAINER_NAME' não está rodando. Deploy abortado."
              exit 1
            fi

            RELEASES="$ROOT/releases"
            SHARED="$ROOT/shared"
            CURRENT="$ROOT/current"
            BACKUPS="$ROOT/backups"
            NEW_RELEASE="$RELEASES/$(date +%Y%m%d%H%M%S)"

            sudo mkdir -p "$NEW_RELEASE"
            sudo unzip -oq "/tmp/$PROJECT_NAME.zip" -d "$NEW_RELEASE"

            # 2. Estrutura e Links
            sudo mkdir -p "$SHARED/storage/app/public"
            sudo ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
            [ -d "$NEW_RELEASE/storage" ] && sudo rm -rf "$NEW_RELEASE/storage"
            sudo ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"
            sudo ln -sfn "$SHARED/storage/app/public" "$NEW_RELEASE/public/storage"

            sudo chown -R www-data:www-data "$NEW_RELEASE" "$SHARED/storage"

            # 3. Operações de Banco
            cd "$NEW_RELEASE"
            echo "🔧 Configurando banco de dados..."
            docker exec -u postgres "$CONTAINER_NAME" psql -c "ALTER USER demanda_user WITH PASSWORD '${{ secrets.DB_PASSWORD }}';"
            docker exec -u postgres "$CONTAINER_NAME" psql -c "GRANT ALL PRIVILEGES ON DATABASE demanda_db TO demanda_user;"
            docker exec -u postgres "$CONTAINER_NAME" psql -c "GRANT ALL ON SCHEMA public TO demanda_user;"

            sudo mkdir -p "$BACKUPS"
            docker exec -u postgres "$CONTAINER_NAME" pg_dump demanda_db > "/tmp/bkp_${PROJECT_NAME}.sql"
            sudo mv "/tmp/bkp_${PROJECT_NAME}.sql" "$BACKUPS/backup_$(date +%Y%m%d%H%M%S).sql"

            # 4. Migrações e Finalização
            if [ "$PROJECT_NAME" = "demanda3d" ]; then
              sudo -u www-data php artisan migrate --force
            else
              sudo -u www-data php artisan migrate:fresh --seed --force
            fi
            
            sudo -u www-data php artisan optimize
            sudo ln -nfs "$NEW_RELEASE" "$CURRENT"
            sudo systemctl reload php8.5-fpm
            
            # Limpeza
            cd "$RELEASES" && ls -1tr | head -n -5 | xargs -d '\n' sudo rm -rf --
            cd "$BACKUPS" && ls -1tr | head -n -5 | xargs -d '\n' sudo rm -rf --
            rm -f "/tmp/$PROJECT_NAME.zip"
            echo "✅ Deploy concluído com sucesso para $PROJECT_NAME"
          EOF
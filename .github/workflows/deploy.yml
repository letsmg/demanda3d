name: 🚀 Deploy Demanda3D

on:
  push:
    branches:
      - main
      - dev # <--- AGORA ELE DISPARA NAS DUAS BRANCHES!

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, pdo_pgsql, redis

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Composer Dependencies (with dev)
        run: composer install --no-interaction

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Tests
        run: php artisan test

      - name: Optimize for Production
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create Deploy Package
        run: |
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "tests/*" \
            -x ".env*" \
            -x "storage/framework/*" \
            -x "storage/logs/*"

      - name: Configure SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          if_key_exists: replace # <--- ADICIONE ESTA LINHA AQUI!

      - name: Atomic Deploy
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_NAME="demanda3d"
          else
            PROJECT_NAME="dev-demanda3d"
          fi
          
          echo "Iniciando deploy para o ambiente: $PROJECT_NAME"

          # scp com flags para ignorar chaves antigas em cache
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          # ssh com flags para ignorar chaves antigas em cache
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@${{ secrets.SERVER_IP }} << EOF
          set -e

          ROOT="/var/www/\$PROJECT_NAME"
          RELEASES="\$ROOT/releases"
          SHARED="\$ROOT/shared"
          CURRENT="\$ROOT/current"

          RELEASE=\$(date +%Y%m%d%H%M%S)
          NEW_RELEASE="\$RELEASES/\$RELEASE"

          sudo mkdir -p "\$RELEASES"
          sudo mkdir -p "\$SHARED/storage"
          sudo mkdir -p "\$NEW_RELEASE"

          if [ ! -f "\$SHARED/.env" ]; then
            echo ".env não encontrado em \$SHARED/.env"
            exit 1
          fi

          sudo unzip -oq /tmp/${PROJECT_NAME}.zip -d "\$NEW_RELEASE"

          sudo ln -sfn "\$SHARED/.env" "\$NEW_RELEASE/.env"

          sudo rm -rf "\$NEW_RELEASE/storage"
          sudo ln -sfn "\$SHARED/storage" "\$NEW_RELEASE/storage"

          sudo rm -rf "\$NEW_RELEASE/public/storage"
          sudo ln -sfn "\$SHARED/storage/app/public" "\$NEW_RELEASE/public/storage"

          cd "\$NEW_RELEASE"

          # Executando comandos internos como www-data para manter permissões limpas
          sudo -u www-data php artisan config:clear || true
          sudo -u www-data php artisan route:clear || true
          sudo -u www-data php artisan cache:clear || true

          sudo -u www-data php artisan migrate --force

          sudo -u www-data php artisan config:cache
          sudo -u www-data php artisan route:cache
          sudo -u www-data php artisan view:cache

          sudo -u www-data php artisan queue:restart || true

          sudo ln -sfn "\$NEW_RELEASE" "\$CURRENT"

          # Ajusta o dono da pasta inteira para o servidor web
          sudo chown -R www-data:www-data "\$NEW_RELEASE"

          cd "\$RELEASES"
          ls -t | tail -n +6 | xargs -r sudo rm -rf --

          rm -f /tmp/${PROJECT_NAME}.zip
          
          echo "✅ Deploy atômico para $PROJECT_NAME finalizado com sucesso!"
          EOF
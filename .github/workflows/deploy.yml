name: 🚀 Deploy Demanda3D

on:
  push:
    branches: [main, dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, pdo_pgsql, redis

      - name: 🟢 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 🔨 Build Assets & Deps
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: 🤐 Criar Pacote de Deploy
        run: |
          zip -r deploy.zip . -x ".git/*" ".github/*" "node_modules/*" "tests/*" ".env*" "storage/framework/*" "storage/logs/*"

      - name: 🔑 Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 🚀 Executar Deploy Atômico
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_NAME="demanda3d"
            ROOT="/var/www/demanda3d"
            CONTAINER_BASE="demanda-psql-prod"
            DOCKER_SRC="docker-compose-prod.yml"
          else
            PROJECT_NAME="dev-demanda3d"
            ROOT="/var/www/dev-demanda3d"
            CONTAINER_BASE="demanda-psql-dev"
            DOCKER_SRC="docker-compose-hom.yml"
          fi

          scp -o StrictHostKeyChecking=accept-new deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ secrets.SERVER_IP }} \
          "PROJECT_NAME=$PROJECT_NAME ROOT=$ROOT CONTAINER_BASE=$CONTAINER_BASE DOCKER_SRC=$DOCKER_SRC bash -s" << 'EOF'
            set -e

            RELEASES="$ROOT/releases"
            SHARED="$ROOT/shared"
            CURRENT="$ROOT/current"
            BACKUPS="$ROOT/backups"
            NEW_RELEASE="$RELEASES/$(date +%Y%m%d%H%M%S)"

            sudo mkdir -p "$NEW_RELEASE"
            sudo unzip -oq "/tmp/$PROJECT_NAME.zip" -d "$NEW_RELEASE"

            # 1. Sincronização de Docker
            echo "📦 Sincronizando $DOCKER_SRC..."
            sudo mkdir -p "$SHARED/docker"
            if [ -f "$NEW_RELEASE/$DOCKER_SRC" ]; then
              sudo cp "$NEW_RELEASE/$DOCKER_SRC" "$SHARED/docker-compose.yml"
            else
              echo "❌ ERRO: $DOCKER_SRC não encontrado na release!"
              exit 1
            fi
            
            # 2. Localizar/Subir Container
            # Definimos o nome esperado do container principal (o que executa o banco/app)
              # Ajuste 'demanda-psql-hom' se o seu container principal tiver outro nome
              EXPECTED_SERVICE="psql-hom" 

              REAL_CONTAINER=$(docker compose -f docker-compose.yml ps -q "$EXPECTED_SERVICE" | xargs docker inspect --format '{{.Name}}' 2>/dev/null | sed 's/\///')

              if [ -z "$REAL_CONTAINER" ]; then
                echo "⚠️ Container não encontrado. Subindo..."
                sudo docker compose up -d --remove-orphans
                
                # Aumentamos o tempo de espera para garantir que o Docker inicializou o container
                sleep 15
                
                REAL_CONTAINER=$(docker compose -f docker-compose.yml ps -q "$EXPECTED_SERVICE" | xargs docker inspect --format '{{.Name}}' 2>/dev/null | sed 's/\///')
              fi

              if [ -z "$REAL_CONTAINER" ]; then
                echo "❌ ERRO: Não foi possível identificar o container para '$EXPECTED_SERVICE'."
                exit 1
              fi
              echo "✅ Usando container: $REAL_CONTAINER"

            # 3. Links Simbólicos
            sudo ln -sfn "$SHARED/docker" "$NEW_RELEASE/docker"
            sudo ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
            [ -d "$NEW_RELEASE/storage" ] && sudo rm -rf "$NEW_RELEASE/storage"
            sudo ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"
            sudo ln -sfn "$SHARED/storage/app/public" "$NEW_RELEASE/public/storage"
            sudo chown -R www-data:www-data "$NEW_RELEASE" "$SHARED/storage"

            # 4. Banco de Dados
            docker exec -u postgres "$REAL_CONTAINER" psql -d demanda_db -c "ALTER USER demanda_user WITH PASSWORD '${{ secrets.DB_PASSWORD }}';" > /dev/null 2>&1 || true
            docker exec -u postgres "$REAL_CONTAINER" psql -d demanda_db -c "GRANT ALL PRIVILEGES ON DATABASE demanda_db TO demanda_user;" > /dev/null 2>&1 || true

            sudo mkdir -p "$BACKUPS"
            docker exec -u postgres "$REAL_CONTAINER" pg_dump demanda_db > "/tmp/bkp_${PROJECT_NAME}.sql"
            sudo mv "/tmp/bkp_${PROJECT_NAME}.sql" "$BACKUPS/backup_$(date +%Y%m%d%H%M%S).sql"

            # 5. Finalização
            cd "$NEW_RELEASE"
            sudo -u www-data php artisan migrate --force
            sudo -u www-data php artisan optimize
            sudo ln -nfs "$NEW_RELEASE" "$CURRENT"
            sudo systemctl reload php8.5-fpm
            
            # Limpeza
            cd "$RELEASES" && ls -1tr | head -n -5 | xargs -d '\n' sudo rm -rf -- || true
            rm -f "/tmp/$PROJECT_NAME.zip"
            echo "✅ Deploy concluído!"
          EOF
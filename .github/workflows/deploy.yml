# ==============================================================================
# ⚠️ AVISO CRÍTICO DE MANUTENÇÃO: NUNCA REMOVA OU ALTERE OS COMENTÁRIOS DESTE ARQUIVO!
# Eles servem como documentação viva para o portfólio e explicam decisões técnicas 
# complexas de infraestrutura que evitam a quebra do pipeline em atualizações futures.
# ==============================================================================

name: 🚀 Deploy Demanda3D

on:
  push:
    # Monitora as duas branches para isolar os ambientes automaticamente
    branches: [main, hom]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, pdo_pgsql, redis

      - name: 🟢 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 🔨 Build Assets & Deps
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: 🤐 Criar Pacote de Deploy
        run: |
          zip -r deploy.zip . -x ".git/*" ".github/*" "node_modules/*" "tests/*" ".env*" "storage/framework/*" "storage/logs/*"

      - name: 🔑 Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 🚀 Executar Deploy Atômico
        run: |
          # Define os metadados do projeto dinamicamente baseando-se na branch.
          # Alinhado com o padrão real de nomes de pastas e projetos na VPS.
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_NAME="demanda3d"
            ROOT="/var/www/demanda3d"
            COMPOSE_FILE="docker-compose-prod.yml"
            MIGRATION_STRATEGY="migrate"
            DB_CONTAINER_TARGET="demanda-psql-prod"
          else
            PROJECT_NAME="dev-demanda3d"
            ROOT="/var/www/dev-demanda3d"
            COMPOSE_FILE="docker-compose-hom.yml"
            MIGRATION_STRATEGY="migrate:fresh --seed"
            DB_CONTAINER_TARGET="demanda-psql-hom"
          fi

          scp -o StrictHostKeyChecking=accept-new deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ secrets.SERVER_IP }} \
            "PROJECT_NAME='$PROJECT_NAME' ROOT='$ROOT' COMPOSE_FILE='$COMPOSE_FILE' MIGRATION_STRATEGY='$MIGRATION_STRATEGY' DB_CONTAINER_TARGET='$DB_CONTAINER_TARGET'" 'bash -s' << 'DEPLOY_SCRIPT'
            set -e

            RELEASES="$ROOT/releases"
            SHARED="$ROOT/shared"
            CURRENT="$ROOT/current"
            BACKUPS="$ROOT/backups"
            NEW_RELEASE="$RELEASES/$(date +%Y%m%d%H%M%S)"

            # Criando diretórios como usuário logado (ubuntu), sem sudo desnecessário
            mkdir -p "$RELEASES" "$SHARED" "$BACKUPS"
            mkdir -p "$NEW_RELEASE"
            
            # Extração limpa e direta
            unzip -oq "/tmp/$PROJECT_NAME.zip" -d "$NEW_RELEASE"

            # 1. Sincronizar configs Docker versionadas (compose e scripts init)
            echo "📦 Sincronizando configs do Docker..."
            mkdir -p "$SHARED/docker"
            [ -d "$NEW_RELEASE/docker" ] && cp -r "$NEW_RELEASE/docker/"* "$SHARED/docker/"

            # Copia o compose do ambiente para referência no shared
            if [ -f "$NEW_RELEASE/$COMPOSE_FILE" ]; then
                cp "$NEW_RELEASE/$COMPOSE_FILE" "$SHARED/docker-compose.yml"
            fi
            
            # Remove fisicamente os arquivos de compose soltos da release para evitar conflito com links futuros
            rm -f "$NEW_RELEASE"/docker-compose*.yml

            # 2. Garantir containers rodando (idempotente)
            echo "🔄 Verificando containers..."
            cd "$SHARED"

            if [ ! -f "docker-compose.yml" ]; then
                echo "⚠️ Erro: docker-compose.yml não encontrado em $SHARED"
                exit 1
            fi

            # Sobe os containers usando o compose padronizado e projeto correto
            sudo docker compose -f docker-compose.yml -p "$PROJECT_NAME" up -d --remove-orphans

            echo "⏳ Aguardando containers iniciarem..."
            sleep 20
            cd "$NEW_RELEASE"
            
            # 3. Links Simbólicos e Permissões (Deploy Atômico)
            echo "🔗 Criando links simbólicos..."
            mkdir -p "$SHARED/storage/app/public"
            
            # Limpeza preventiva operada pelo usuário ubuntu
            rm -rf "$NEW_RELEASE/.env" "$NEW_RELEASE/docker" "$NEW_RELEASE/docker-compose.yml"

            ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
            ln -sfn "$SHARED/docker" "$NEW_RELEASE/docker"
            ln -sfn "$SHARED/docker-compose.yml" "$NEW_RELEASE/docker-compose.yml"

            [ -d "$NEW_RELEASE/storage" ] && rm -rf "$NEW_RELEASE/storage"
            ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"
            ln -sfn "$SHARED/storage/app/public" "$NEW_RELEASE/public/storage"
            
            # 🔥 PADRÃO DE MERCADO: Mantém o controle estrutural com o ubuntu, 
            # liberando permissão de escrita de grupo (775) para o www-data nas pastas do Laravel.
            sudo chown -R ubuntu:www-data "$NEW_RELEASE" "$SHARED/storage"
            sudo chmod -R 775 "$SHARED/storage"

            # 4. Verificação do Banco de Dados
            echo "🔍 Verificando banco de dados..."

            DB_USER=$(grep -oP '^DB_USERNAME=\K.*' "$SHARED/.env" | head -1 || echo "postgres")
            DB_NAME=$(grep -oP '^DB_DATABASE=\K.*' "$SHARED/.env" | head -1 || echo "demanda_db_prod")
            
            # Encontra dinamicamente o banco mapeado para este ambiente específico (main ou hom)
            CONTAINER_NAME=$(sudo docker ps --filter "name=$DB_CONTAINER_TARGET" --format "{{.Names}}" | head -1)

            if [ -f "$SHARED/.env.docker" ] && [ ! -z "$CONTAINER_NAME" ]; then
                DB_PASS=$(grep -oP '^POSTGRES_PASSWORD=\K.*' "$SHARED/.env.docker" | head -1)
                
                echo "⏳ Validando conexões internas no contêiner $CONTAINER_NAME..."
                sudo docker exec -i -e PGPASSWORD="$DB_PASS" "$CONTAINER_NAME" \
                  psql -U "$DB_USER" -d postgres -tAc \
                  "SELECT usename FROM pg_user WHERE usename = '$DB_USER';" 2>/dev/null \
                  || echo "⚠️  Aviso: não foi possível verificar o usuário $DB_USER"

                sudo docker exec -i -e PGPASSWORD="$DB_PASS" "$CONTAINER_NAME" \
                  psql -U "$DB_USER" -d postgres -tAc \
                  "SELECT datname FROM pg_database WHERE datname = '$DB_NAME';" 2>/dev/null \
                  || echo "⚠️  Aviso: não foi possível verificar o database $DB_NAME"
            else
                echo "ℹ️ Pulando checagem direta do psql (Container inicializando ou indisponível)"
            fi

            # 5. Migrations e Otimização
            cd "$NEW_RELEASE"
            
            # Identifica dinamicamente o nome do contêiner da aplicação que está rodando
            APP_CONTAINER=$(sudo docker ps --filter "name=${PROJECT_NAME}-app" --format "{{.Names}}" | head -1)
            
            # Busca alternativa para o container de produção caso não use nomenclatura padrão
            if [ -z "$APP_CONTAINER" ] && [ "$PROJECT_NAME" = "demanda3d" ]; then
                APP_CONTAINER=$(sudo docker ps --filter "name=demanda-app-prod" --format "{{.Names}}" | head -1)
            fi

            if [ -z "$APP_CONTAINER" ]; then
                APP_CONTAINER=$(sudo docker compose -f "$SHARED/docker-compose.yml" -p "$PROJECT_NAME" ps -q app 2>/dev/null)
            fi

            echo "🚀 Rodando Migrations dentro do contêiner: $APP_CONTAINER"
            sudo docker exec -i "$APP_CONTAINER" php artisan $MIGRATION_STRATEGY --force

            echo "⚡ Otimizando a aplicação..."
            sudo docker exec -i "$APP_CONTAINER" php artisan optimize

            # 6. Ativar nova release (Sem sudo, o link agora pertence por completo ao ubuntu)
            rm -f "$CURRENT"
            ln -nfs "$NEW_RELEASE" "$CURRENT"
            
            echo "🔄 Recarregando cache do container de aplicação..."
            sudo docker restart "$APP_CONTAINER"

            # 7. Limpeza: mantém últimas 5 releases
            cd "$RELEASES" && ls -1tr | head -n -5 | xargs -d '\n' rm -rf -- || true
            rm -f "/tmp/$PROJECT_NAME.zip"
            echo "✅ Deploy concluído com sucesso!"
          DEPLOY_SCRIPT
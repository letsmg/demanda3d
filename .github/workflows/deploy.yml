# ==============================================================================
# ⚠️ AVISO CRÍTICO DE MANUTENÇÃO: NUNCA REMOVA OU ALTERE OS COMENTÁRIOS DESTE ARQUIVO!
#
# HISTÓRICO DE INFRAESTRUTURA:
# - O pipeline utiliza 'set -Eeuo pipefail'. Qualquer falha interrompe o deploy.
#
# LEMBRETE DE FUNCIONAMENTO (PADRÃO):
# - O Banco de Dados e o Redis rodam em containers (Docker).
# - O PHP/Laravel roda NATIVAMENTE no sistema operacional (Host Ubuntu).
# - O deploy realiza as migrations e otimizações executando 'php artisan' 
#   diretamente no servidor, fora de containers. NÃO TENTE ALTERAR PARA 
#   'docker exec' pois a aplicação não está conteinerizada.
#
# Estes comentários servem como documentação viva para evitar que futuras 
# otimizações quebrem a resiliência do deploy atômico.
# ==============================================================================

name: 🚀 Deploy Demanda3D

on:
  push:
    branches:
      - main
      - hom

  workflow_dispatch:

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:

      # ==========================================================================
      # CHECKOUT
      # ==========================================================================

      - name: 📥 Checkout
        uses: actions/checkout@v5

      # ==========================================================================
      # PHP
      # ==========================================================================

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: >
            mbstring,
            bcmath,
            pdo_pgsql,
            redis
          coverage: none

      # ==========================================================================
      # NODE
      # ==========================================================================

      - name: 🟢 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # ==========================================================================
      # BUILD
      # ==========================================================================

      - name: 🔨 Instalar dependências e gerar build
        run: |

          set -Eeuo pipefail

          composer install \
            --no-dev \
            --prefer-dist \
            --optimize-autoloader \
            --no-interaction

          npm ci

          npm run build

      # ==========================================================================
      # PACOTE
      # ==========================================================================

      - name: 📦 Criar pacote de Deploy
        run: |

          set -Eeuo pipefail

          zip -rq deploy.zip . \
            -x ".git/*" \
            ".github/*" \
            "node_modules/*" \
            "tests/*" \
            ".env*" \
            "storage/framework/*" \
            "storage/logs/*"

          echo "Arquivo criado:"
          ls -lh deploy.zip

      # ==========================================================================
      # SSH
      # ==========================================================================

      - name: 🔑 Configurar SSH
        run: |

          set -Eeuo pipefail

          mkdir -p ~/.ssh

          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

      # ==========================================================================
      # DEPLOY
      # ==========================================================================

      - name: 🚀 Executar Deploy Atômico
        run: |

          set -Eeuo pipefail

          #######################################################################
          # Seleção do ambiente
          #######################################################################

          if [[ "${{ github.ref_name }}" == "main" ]]; then

            PROJECT_NAME="demanda3d"
            ROOT="/var/www/demanda3d"
            COMPOSE_FILE="docker-compose-prod.yml"
            MIGRATION_STRATEGY="migrate"
            DB_CONTAINER_TARGET="demanda-psql-prod"

          else

            PROJECT_NAME="dev-demanda3d"
            ROOT="/var/www/dev-demanda3d"
            COMPOSE_FILE="docker-compose-hom.yml"
            MIGRATION_STRATEGY="migrate:fresh --seed"
            DB_CONTAINER_TARGET="demanda-psql-hom"

          fi

          echo "Projeto........: $PROJECT_NAME"
          echo "Root...........: $ROOT"
          echo "Compose........: $COMPOSE_FILE"
          echo "Migration......: $MIGRATION_STRATEGY"

          echo "📤 Enviando pacote..."

          scp \
            -o StrictHostKeyChecking=accept-new \
            deploy.zip \
            ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          ssh \
            -o StrictHostKeyChecking=accept-new \
            ubuntu@${{ secrets.SERVER_IP }} \
            "PROJECT_NAME='$PROJECT_NAME' ROOT='$ROOT' COMPOSE_FILE='$COMPOSE_FILE' MIGRATION_STRATEGY='$MIGRATION_STRATEGY' DB_CONTAINER_TARGET='$DB_CONTAINER_TARGET' RUN_NUMBER='${{ github.run_number }}'" \
            'bash -s' << 'DEPLOY_SCRIPT'

            set -Eeuo pipefail

            RELEASES="$ROOT/releases"
            SHARED="$ROOT/shared"
            CURRENT="$ROOT/current"
            BACKUPS="$ROOT/backups"
            
            NEW_RELEASE="$RELEASES/$(date +%Y%m%d%H%M%S)-${RUN_NUMBER}"

            echo "📂 Criando estrutura base..."
            sudo mkdir -p "$RELEASES" "$SHARED" "$BACKUPS" "$NEW_RELEASE"
                        
            sudo chown -R ubuntu:ubuntu "$SHARED"            

            echo "🔧 Aplicando permissões iniciais..."
            sudo chown ubuntu:www-data "$RELEASES" "$SHARED"
            sudo chown ubuntu:ubuntu "$BACKUPS"
            sudo chown ubuntu:www-data "$NEW_RELEASE"

            echo "📦 Extraindo arquivos..."
            unzip -oq "/tmp/$PROJECT_NAME.zip" -d "$NEW_RELEASE"

            #######################################################################
            # 1. Sincronizar configs Docker
            #######################################################################
            echo "🐳 Sincronizando configs do Docker..."
            mkdir -p "$SHARED/docker"
            [ -d "$NEW_RELEASE/docker" ] && cp -r "$NEW_RELEASE/docker/"* "$SHARED/docker/" || true

            if [ -f "$NEW_RELEASE/$COMPOSE_FILE" ]; then
                cp "$NEW_RELEASE/$COMPOSE_FILE" "$SHARED/docker-compose.yml"
            fi
            
            rm -f "$NEW_RELEASE"/docker-compose*.yml

            #######################################################################
            # 2. Subir Containers
            #######################################################################
            echo "🔄 Garantindo que containers estão de pé..."
            cd "$SHARED"

            if [ ! -f "docker-compose.yml" ]; then
                echo "⚠️ Erro: docker-compose.yml não encontrado em $SHARED"
                exit 1
            fi

            sudo docker compose -f docker-compose.yml -p "$PROJECT_NAME" up -d --remove-orphans
            
            cd "$NEW_RELEASE"
            
            #######################################################################
            # 3. Links Simbólicos e Permissões
            #######################################################################
            echo "🔗 Configurando links de ambiente, storage e bootstrap/cache..."
            
            sudo mkdir -p "$SHARED/storage/framework/cache/data"
            sudo mkdir -p "$SHARED/storage/framework/views"
            sudo mkdir -p "$SHARED/storage/framework/sessions"
            sudo mkdir -p "$SHARED/bootstrap/cache"
            
            rm -rf "$NEW_RELEASE/.env" "$NEW_RELEASE/storage" "$NEW_RELEASE/bootstrap/cache"

            ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
            ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"
            ln -sfn "$SHARED/bootstrap/cache" "$NEW_RELEASE/bootstrap/cache"
            
            sudo chown -R ubuntu:www-data "$SHARED/storage" "$SHARED/bootstrap/cache"
            sudo chmod -R 775 "$SHARED/storage" "$SHARED/bootstrap/cache"
            
            echo "✅ Permissões aplicadas."
            
            #######################################################################
            # 4, 5, 6 e 7. Execução protegida (Migrations, Link e Limpeza)
            #######################################################################
            (
              set -Eeuo pipefail
              
              # 4. Banco
              echo "🔍 Verificando banco de dados..."
              DB_USER=$(grep -oP '^DB_USERNAME=\K.*' "$SHARED/.env" | head -1 || echo "postgres")
              CONTAINER_NAME=$(sudo docker ps --filter "name=$DB_CONTAINER_TARGET" --format "{{.Names}}" | head -1)
              if [ -f "$SHARED/.env.docker" ] && [ ! -z "$CONTAINER_NAME" ]; then
                  DB_PASS=$(grep -oP '^POSTGRES_PASSWORD=\K.*' "$SHARED/.env.docker" | head -1)
                  sudo docker exec -i -e PGPASSWORD="$DB_PASS" "$CONTAINER_NAME" psql -U "$DB_USER" -d postgres -tAc "SELECT 1;" > /dev/null 2>&1
              fi

              # 5. Migrations
              echo "🚀 Rodando Migrations nativamente no servidor..."
              cd "$NEW_RELEASE"
              php artisan $MIGRATION_STRATEGY --force
              php artisan optimize

              # 6. Ativação Atômica
              echo "🔄 Atualizando link atual..."
              sudo rm -rf "$CURRENT"
              sudo ln -sfn "$NEW_RELEASE" "$CURRENT"
              sudo chown -h ubuntu:ubuntu "$CURRENT"
              
              # 7. Limpeza
              echo "🧹 Limpando..."
              cd "$RELEASES" && ls -1tr | head -n -5 | xargs -d '\n' rm -rf -- || true
              rm -f "/tmp/$PROJECT_NAME.zip"
              echo "✅ Deploy concluído com sucesso!"
            ) || { echo "❌ Ocorreu um erro no bloco crítico de deploy"; exit 1; }
          DEPLOY_SCRIPT

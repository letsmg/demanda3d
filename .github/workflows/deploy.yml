# ==============================================================================
# ⚠️ AVISO CRÍTICO DE MANUTENÇÃO: NUNCA REMOVA OU ALTERE OS COMENTÁRIOS DESTE ARQUIVO!
# Eles servem como documentação viva para o portfólio e explicam decisões técnicas 
# complexas de infraestrutura que evitam a quebra do pipeline em atualizações futuras.
# ==============================================================================

name: 🚀 Deploy Demanda3D

on:
  push:
    # Monitora as duas branches para isolar os ambientes automaticamente
    branches: [main, hom]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, pdo_pgsql, redis

      - name: 🟢 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 🔨 Build Assets & Deps
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: 🤐 Criar Pacote de Deploy
        run: |
          zip -r deploy.zip . -x ".git/*" ".github/*" "node_modules/*" "tests/*" ".env*" "storage/framework/*" "storage/logs/*"

      - name: 🔑 Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 🚀 Executar Deploy Atômico
        run: |
          # Define os metadados do projeto dinamicamente baseando-se na branch
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_NAME="demanda3d"
            ROOT="/var/www/demanda3d"
          else
            PROJECT_NAME="dev-demanda3d"
            ROOT="/var/www/dev-demanda3d"
          fi

          scp -o StrictHostKeyChecking=accept-new deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          ssh -o StrictHostKeyChecking=accept-new ubuntu@${{ secrets.SERVER_IP }} \
            "PROJECT_NAME='$PROJECT_NAME' ROOT='$ROOT'" 'bash -s' << 'DEPLOY_SCRIPT'
            set -e

            RELEASES="$ROOT/releases"
            SHARED="$ROOT/shared"
            CURRENT="$ROOT/current"
            BACKUPS="$ROOT/backups"
            NEW_RELEASE="$RELEASES/$(date +%Y%m%d%H%M%S)"

            sudo mkdir -p "$NEW_RELEASE" "$SHARED" "$BACKUPS"
            sudo unzip -oq "/tmp/$PROJECT_NAME.zip" -d "$NEW_RELEASE"

            # 1. Sincronizar configs Docker versionadas (compose e scripts init)
            echo "📦 Sincronizando configs do Docker..."
            sudo mkdir -p "$SHARED/docker"
            [ -d "$NEW_RELEASE/docker" ] && sudo cp -r "$NEW_RELEASE/docker/"* "$SHARED/docker/"

            # Copia o compose do ambiente para referência no shared
            if [ "$PROJECT_NAME" = "demanda3d" ]; then
              [ -f "$NEW_RELEASE/docker-compose-prod.yml" ] && sudo cp "$NEW_RELEASE/docker-compose-prod.yml" "$SHARED/docker-compose.yml"
            else
              [ -f "$NEW_RELEASE/docker-compose-hom.yml" ] && sudo cp "$NEW_RELEASE/docker-compose-hom.yml" "$SHARED/docker-compose.yml"
            fi

            # 2. Garantir containers rodando (idempotente)
            echo "🔄 Verificando containers..."
            cd "$SHARED"

            # Define o arquivo de configuração correto
            if [ "$PROJECT_NAME" = "demanda3d" ]; then
                COMPOSE_FILE="docker-compose-prod.yml"
            else
                COMPOSE_FILE="docker-compose-hom.yml"
            fi

            # Verifica se o arquivo existe para evitar erro
            if [ ! -f "$COMPOSE_FILE" ]; then
                echo "⚠️ Erro: $COMPOSE_FILE não encontrado em $SHARED"
                exit 1
            fi

            # Sobe os containers usando o arquivo e projeto corretos
            # O --remove-orphans cuida de remover containers que não estão mais no arquivo
            sudo docker compose -f "$COMPOSE_FILE" -p "$PROJECT_NAME" up -d --remove-orphans

            echo "⏳ Aguardando containers iniciarem..."
            sleep 20
            cd "$NEW_RELEASE"
            
            # 3. Links Simbólicos e Permissões (Deploy Atômico)
            echo "🔗 Criando links simbólicos..."
            sudo mkdir -p "$SHARED/storage/app/public"
            sudo ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
            sudo ln -sfn "$SHARED/docker" "$NEW_RELEASE/docker"
            [ -d "$NEW_RELEASE/storage" ] && sudo rm -rf "$NEW_RELEASE/storage"
            sudo ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"
            sudo ln -sfn "$SHARED/storage/app/public" "$NEW_RELEASE/public/storage"
            sudo chown -R www-data:www-data "$NEW_RELEASE" "$SHARED/storage"
            sudo chmod -R 775 "$SHARED/storage"

            # =============================================
            # 6. Banco de Dados & Backup Seguro
            # =============================================

            # Extrai a senha do .env.docker para autenticação (PostgreSQL Alpine 18.4
            # com POSTGRES_USER customizado não cria o role "postgres" — usamos o
            # superusuário da aplicação para verificações e backup).
            DB_PASS=$(grep -oP '^POSTGRES_PASSWORD=\K.*' "$SHARED/.env.docker" | head -1)

            # Verificação rápida de sanidade do banco (usuário e database existem?)
            echo "🔍 Verificando banco de dados..."
            sudo docker exec -i -e PGPASSWORD="$DB_PASS" "$CONTAINER_NAME" \
              psql -U "$DB_USER" -d postgres -tAc \
              "SELECT usename FROM pg_user WHERE usename = '$DB_USER';" 2>/dev/null \
              || echo "⚠️  Aviso: não foi possível verificar o usuário $DB_USER"

            sudo docker exec -i -e PGPASSWORD="$DB_PASS" "$CONTAINER_NAME" \
              psql -U "$DB_USER" -d postgres -tAc \
              "SELECT datname FROM pg_database WHERE datname = '$DB_NAME';" 2>/dev/null \
              || echo "⚠️  Aviso: não foi possível verificar o database $DB_NAME"

            # 3. Migrations e Otimização
            cd "$NEW_RELEASE"
            
            if [ "$PROJECT_NAME" = "demanda3d" ]; then
              sudo -u www-data php artisan migrate --force
            else
              sudo -u www-data php artisan migrate:fresh --seed --force
            fi

            sudo -u www-data php artisan optimize

            # 4. Ativar nova release
            sudo ln -nfs "$NEW_RELEASE" "$CURRENT"
            sudo systemctl reload php8.5-fpm

            # 5. Limpeza: mantém últimas 5 releases
            cd "$RELEASES" && ls -1tr | head -n -5 | xargs -d '\n' sudo rm -rf -- || true
            rm -f "/tmp/$PROJECT_NAME.zip"
            echo "✅ Deploy concluído com sucesso!"
          DEPLOY_SCRIPT

# ==============================================================================
# 📋 NOTAS DE INFRAESTRUTURA
# ==============================================================================
# Os containers PostgreSQL e Redis são gerenciados MANUALMENTE no servidor.
# Suba-os uma vez com:
#
#   # Homologação
#   cd /var/www/dev-demanda3d/shared
#   sudo -E docker compose -p dev-demanda3d up -d
#
#   # Produção
#   cd /var/www/demanda3d/shared
#   sudo -E docker compose -p demanda3d up -d
#
# O .env.docker (com POSTGRES_PASSWORD) já está no $SHARED/ e é lido via env_file.
# Use 'sudo -E' para preservar as variáveis de ambiente, ou configure o .env.docker
# diretamente no servidor com a senha correta.
#
# O deploy cuida apenas do código da aplicação (PHP, assets, migrations).
# ==============================================================================

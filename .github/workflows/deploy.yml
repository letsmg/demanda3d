name: 🚀 Deploy Demanda3D

on:
  push:
    branches: [main, dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, pdo_pgsql, redis

      - name: 🟢 Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 🔨 Build Assets & Deps
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci
          npm run build

      - name: 🤐 Criar Pacote de Deploy
        run: |
          zip -r deploy.zip . -x ".git/*" ".github/*" "node_modules/*" "tests/*" ".env*" "storage/framework/*" "storage/logs/*"

      - name: 🔑 Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 🚀 Executar Deploy Atômico
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_NAME="demanda3d"
            ROOT="/var/www/demanda3d"
          else
            PROJECT_NAME="dev-demanda3d"
            ROOT="/var/www/dev-demanda3d"
          fi

          scp -o StrictHostKeyChecking=no deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVER_IP }} \
          "PROJECT_NAME=$PROJECT_NAME ROOT=$ROOT bash -s" << 'EOF'
            set -e
            RELEASES="$ROOT/releases"
            SHARED="$ROOT/shared"
            CURRENT="$ROOT/current"
            BACKUPS="$ROOT/backups"
            NEW_RELEASE="$RELEASES/$(date +%Y%m%d%H%M%S)"

            sudo mkdir -p "$NEW_RELEASE"
            sudo unzip -oq "/tmp/$PROJECT_NAME.zip" -d "$NEW_RELEASE"

            # Links Simbólicos
            sudo ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
            sudo mkdir -p "$SHARED/storage/app/public"
            sudo rm -rf "$NEW_RELEASE/storage" && sudo ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"
            sudo ln -sfn "$SHARED/storage/app/public" "$NEW_RELEASE/public/storage"

            # Permissões Básicas
            sudo chown -R www-data:www-data "$NEW_RELEASE"

            # Artisan, Backup e Migrações
            cd "$NEW_RELEASE"
            if [ "$PROJECT_NAME" = "demanda3d" ]; then
                echo "📦 Fazendo backup de segurança..."
                sudo mkdir -p "$BACKUPS"
                # Usa /tmp para contornar problemas de permissão na pasta de backup
                sudo -u postgres pg_dump demanda_db > /tmp/backup_temp.sql
                sudo mv /tmp/backup_temp.sql "$BACKUPS/backup_$(date +%Y%m%d%H%M%S).sql"
                
                echo "🚀 Executando migrações..."
                sudo -u www-data php artisan migrate --force
            else
                echo "🧪 Ambiente DEV: Resetando banco..."
                sudo -u www-data php artisan migrate:fresh --seed --force
            fi
            
            sudo -u www-data php artisan optimize

            # Troca Atômica
            sudo ln -nfs "$NEW_RELEASE" "$CURRENT"
            sudo systemctl reload php8.5-fpm
            
            # Limpeza
            cd "$RELEASES" && ls -1tr | head -n -5 | xargs -d '\n' sudo rm -rf --
            cd "$BACKUPS" && ls -1tr | head -n -5 | xargs -d '\n' sudo rm -rf --
            rm -f "/tmp/$PROJECT_NAME.zip"
            echo "✅ Deploy concluído."
          EOF
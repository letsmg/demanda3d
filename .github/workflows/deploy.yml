name: 🚀 Deploy Demanda3D

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, pdo_pgsql, redis

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Composer Dependencies (with dev)
        run: composer install --no-interaction

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Assets
        run: npm run build

      - name: Prepare Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Tests
        run: php artisan test

      - name: Optimize for Production
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create Deploy Package
        run: |
          zip -r deploy.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "tests/*" \
            -x ".env*" \
            -x "storage/framework/*" \
            -x "storage/logs/*"

      - name: Configure SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Atomic Deploy
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_NAME="demanda3d"
          else
            PROJECT_NAME="dev-demanda3d"
          fi
          
          echo "Iniciando deploy para o ambiente: $PROJECT_NAME"

          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@${{ secrets.SERVER_IP }} PROJECT_NAME="$PROJECT_NAME" 'bash -s' << 'EOF'
          set -e

          ROOT="/var/www/$PROJECT_NAME"
          RELEASES="$ROOT/releases"
          SHARED="$ROOT/shared"
          CURRENT="$ROOT/current"
          
          RELEASE=$(date +%Y%m%d%H%M%S)
          NEW_RELEASE="$RELEASES/$RELEASE"

          # 1. Preparar pastas
          sudo mkdir -p "$NEW_RELEASE"
          
          # 2. Extrair
          sudo unzip -oq "/tmp/$PROJECT_NAME.zip" -d "$NEW_RELEASE"

          # 3. Garantir estrutura de diretórios do Laravel antes de qualquer comando
          sudo mkdir -p "$SHARED/storage/framework/views"
          sudo mkdir -p "$SHARED/storage/framework/cache"
          sudo mkdir -p "$SHARED/storage/framework/sessions"
          sudo mkdir -p "$SHARED/storage/logs"

          # 4. Configurar permissões imediatas
          sudo chown -R www-data:www-data "$NEW_RELEASE"
          sudo chmod -R 775 "$NEW_RELEASE"
          sudo chown -R www-data:www-data "$SHARED/storage"
          sudo chmod -R 775 "$SHARED/storage"

          # 5. Configurar links simbólicos
          sudo ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
          
          sudo rm -rf "$NEW_RELEASE/storage"
          sudo ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"
          
          sudo rm -rf "$NEW_RELEASE/public/storage"
          sudo ln -sfn "$SHARED/storage/app/public" "$NEW_RELEASE/public/storage"

          # 6. Rodar comandos artisan com o código pronto
          cd "$NEW_RELEASE"
          
          sudo -u www-data php artisan config:clear
          sudo -u www-data php artisan route:clear
          sudo -u www-data php artisan cache:clear
          sudo -u www-data php artisan view:clear || true 

          sudo -u www-data php artisan migrate --force

          sudo -u www-data php artisan config:cache
          sudo -u www-data php artisan route:cache
          sudo -u www-data php artisan view:cache

          # 7. Finalização
          sudo ln -sfn "$NEW_RELEASE" "$CURRENT"
          
          cd "$RELEASES"
          ls -t | tail -n +6 | xargs -r sudo rm -rf --
          rm -f "/tmp/$PROJECT_NAME.zip"
          
          echo "✅ Deploy atômico para $PROJECT_NAME finalizado com sucesso!"
          EOF
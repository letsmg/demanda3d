# ==============================================================================
# ⚠️ AVISO CRÍTICO DE MANUTENÇÃO: NUNCA REMOVA OU ALTERE OS COMENTÁRIOS DESTE ARQUIVO!
#
# ARQUITETURA (fixa, não muda sem decisão consciente):
# - Banco de Dados e Redis rodam em containers Docker.
# - PHP/Laravel roda NATIVAMENTE no host (Ubuntu), fora de containers.
#
# ✅ SEMPRE:
# - Rodar 'php artisan' (migrate, optimize, etc.) diretamente no host, nunca
#   via 'docker exec'. A aplicação não está conteinerizada.
# - Esperar o Postgres responder (pg_isready) antes de rodar migrations.
# - Rodar 'chown -R' no release DEPOIS de extrair o zip (nunca antes — o
#   unzip cria arquivos com grupo do processo, não www-data).
# - Sincronizar storage/ do release para $SHARED/storage (rsync) ANTES de
#   apagar e recriar o symlink. Qualquer pasta/arquivo novo versionado
#   dentro de storage/ (ex.: storage/app/public/home) só chega ao servidor
#   por causa dessa sincronização.
# - Rodar 'optimize:clear' ANTES de 'config:cache' / 'route:cache' /
#   'view:cache' — nunca só 'optimize' sozinho, ou cache antigo (HTML/assets
#   com hashes do Vite desatualizados) pode continuar sendo servido.
# - Recarregar o php-fpm (reload, não restart) depois de trocar o cache,
#   para descartar opcache do release anterior.
# - Fazer backup do banco (pg_dump) antes de qualquer migration em produção
#   (main). Não é necessário em hom, que usa migrate:fresh.
#
# ❌ NUNCA:
# - Sobrescrever ou apagar storage/app/public/imgs/products no deploy — é
#   conteúdo de upload de usuário em produção, não versionado no Git.
#   Precisa continuar excluído tanto do zip quanto do rsync.
# - Usar 'migrate:fresh' na branch main. Só 'migrate --force' (destrutivo
#   demais para dados reais).
# - Assumir que $SHARED/.env já existe em servidor novo — o script falha
#   cedo e com mensagem clara se não existir; não tente contornar isso
#   criando um .env vazio automaticamente.
# - Remover o '(...)  || { exit 1; }' do bloco crítico (migrations/link) —
#   é o que garante que uma falha ali não deixa o deploy "meio aplicado".
#
# Estes comentários servem como documentação viva para evitar que futuras
# otimizações quebrem a resiliência do deploy atômico.
# ==============================================================================

name: 🚀 Deploy Demanda3D

on:
  push:
    branches:
      - main
      - hom

  workflow_dispatch:

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:

      # ==========================================================================
      # CHECKOUT
      # ==========================================================================

      - name: 📥 Checkout
        uses: actions/checkout@v7

      # ==========================================================================
      # PHP
      # ==========================================================================

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: >
            mbstring,
            bcmath,
            pdo_pgsql,
            redis
          coverage: none

      # ==========================================================================
      # NODE
      # ==========================================================================

      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # ==========================================================================
      # BUILD
      # ==========================================================================

      - name: 🔨 Instalar dependências e gerar build
        run: |

          set -Eeuo pipefail

          composer install \
            --no-dev \
            --prefer-dist \
            --optimize-autoloader \
            --no-interaction

          npm ci

          npm run build

          # 👇 ADICIONE ESTES DOIS PASSOS BEM AQUI:
      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go-service/go.mod

      - name: 📦 Compilar Microserviço em Go
        run: |
          set -Eeuo pipefail
          cd go-service
          go mod tidy
          # Compila gerando o binário direto na pasta do serviço que será zipada
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -trimpath -o notification-service .

      # ==========================================================================
      # PACOTE
      # ==========================================================================

      - name: 📦 Criar pacote de Deploy
        run: |

          set -Eeuo pipefail

          # O zip vai empacotar o 'go-service/notification-service' gerado no passo anterior
          zip -rq deploy.zip . \
            -x ".git/*" \
            ".github/*" \
            "node_modules/*" \
            "tests/*" \
            ".env*" \
            "storage/framework/*" \
            "storage/logs/*" \
            "storage/app/public/imgs/products/*"

          echo "Arquivo criado:"
          ls -lh deploy.zip

      # ==========================================================================
      # SSH
      # ==========================================================================

      - name: 🔑 Configurar SSH
        run: |

          set -Eeuo pipefail

          mkdir -p ~/.ssh

          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

      # ==========================================================================
      # DEPLOY
      # ==========================================================================

      - name: 🚀 Executar Deploy Atômico
        run: |

          set -Eeuo pipefail

          #######################################################################
          # Seleção do ambiente
          #######################################################################

          if [[ "${{ github.ref_name }}" == "main" ]]; then

            PROJECT_NAME="demanda3d"
            ROOT="/var/www/demanda3d"
            COMPOSE_FILE="docker-compose-prod.yml"
            MIGRATION_STRATEGY="migrate"
            DB_CONTAINER_TARGET="demanda-psql-prod"

          else

            PROJECT_NAME="dev-demanda3d"
            ROOT="/var/www/dev-demanda3d"
            COMPOSE_FILE="docker-compose-hom.yml"
            MIGRATION_STRATEGY="migrate:fresh --seed"
            #MIGRATION_STRATEGY="migrate:fresh"
            DB_CONTAINER_TARGET="demanda-psql-hom"

          fi

          echo "Projeto........: $PROJECT_NAME"
          echo "Root...........: $ROOT"
          echo "Compose........: $COMPOSE_FILE"
          echo "Migration......: $MIGRATION_STRATEGY"

          echo "📤 Enviando pacote..."

          scp \
            -o StrictHostKeyChecking=accept-new \
            deploy.zip \
            ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          ssh \
            -o StrictHostKeyChecking=accept-new \
            ubuntu@${{ secrets.SERVER_IP }} \
            "PROJECT_NAME='$PROJECT_NAME' ROOT='$ROOT' COMPOSE_FILE='$COMPOSE_FILE' MIGRATION_STRATEGY='$MIGRATION_STRATEGY' DB_CONTAINER_TARGET='$DB_CONTAINER_TARGET' RUN_NUMBER='${{ github.run_number }}'" \
            'bash -s' << 'DEPLOY_SCRIPT'

            set -Eeuo pipefail

            RELEASES="$ROOT/releases"
            SHARED="$ROOT/shared"
            CURRENT="$ROOT/current"
            BACKUPS="$ROOT/backups"

            NEW_RELEASE="$RELEASES/$(date +%Y%m%d%H%M%S)-${RUN_NUMBER}"

            echo "📂 Criando estrutura base..."
            sudo mkdir -p "$RELEASES" "$SHARED" "$BACKUPS" "$NEW_RELEASE"

            sudo chown -R ubuntu:ubuntu "$SHARED"

            echo "🔧 Aplicando permissões iniciais..."
            sudo chown ubuntu:www-data "$RELEASES" "$SHARED"
            sudo chown ubuntu:ubuntu "$BACKUPS"
            sudo chown ubuntu:www-data "$NEW_RELEASE"

            #######################################################################
            # Pré-requisito: .env compartilhado precisa existir antes do 1º deploy
            #######################################################################
            if [ ! -f "$SHARED/.env" ]; then
                echo "❌ Erro: $SHARED/.env não encontrado."
                echo "   Crie o .env compartilhado manualmente antes do primeiro deploy."
                exit 1
            fi

            echo "📦 Extraindo arquivos..."
            unzip -oq "/tmp/$PROJECT_NAME.zip" -d "$NEW_RELEASE"

            # Corrige dono/grupo de TODO o conteúdo recém-extraído (o unzip
            # criava arquivos com grupo do processo, não www-data).
            sudo chown -R ubuntu:www-data "$NEW_RELEASE"

            #######################################################################
            # 1. Sincronizar configs Docker
            #######################################################################
            echo "🐳 Sincronizando configs do Docker..."
            mkdir -p "$SHARED/docker"
            [ -d "$NEW_RELEASE/docker" ] && cp -r "$NEW_RELEASE/docker/"* "$SHARED/docker/" || true

            # Garante permissão de execução para scripts de entrypoint Docker
            find "$SHARED/docker" -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

            if [ -f "$NEW_RELEASE/$COMPOSE_FILE" ]; then
                cp "$NEW_RELEASE/$COMPOSE_FILE" "$SHARED/docker-compose.yml"
            fi

            rm -f "$NEW_RELEASE"/docker-compose*.yml

            #######################################################################
            # 2. Subir Containers
            #######################################################################
            echo "🔄 Garantindo que containers estão de pé..."
            
            # 👇 A LINHA MÁGICA: Linka a pasta de código do Go da nova release para a shared
            ln -sfn "$NEW_RELEASE/go-service" "$SHARED/go-service"

            cd "$SHARED"

            if [ ! -f "docker-compose.yml" ]; then
                echo "❌ Erro: docker-compose.yml não encontrado em $SHARED"
                exit 1
            fi

            sudo docker compose -f docker-compose.yml -p "$PROJECT_NAME" up -d --remove-orphans
            
            cd "$NEW_RELEASE"

            #######################################################################
            # 3. Links Simbólicos e Permissões
            #######################################################################
            echo "🔗 Configurando links de ambiente, storage e bootstrap/cache..."

            # Garante a existência das estruturas necessárias no SHARED
            sudo mkdir -p "$SHARED/storage/framework/cache/data"
            sudo mkdir -p "$SHARED/storage/framework/views"
            sudo mkdir -p "$SHARED/storage/framework/sessions"
            sudo mkdir -p "$SHARED/bootstrap/cache"

            # LIMPEZA CRÍTICA: Remove caches antigos do SHARED.
            # Isso impede que o Laravel carregue classes da release anterior (causando o erro de Dispatcher).
            sudo rm -rf "$SHARED/bootstrap/cache/"*

            # Sincroniza TODO o conteúdo de storage/ do release para o storage
            # compartilhado, sobrescrevendo o que já existir.
            # (Exceto storage/app/public/imgs/products)
            if [ -d "$NEW_RELEASE/storage" ]; then
                echo "🔄 Sincronizando storage/ para o shared (preservando imgs/products)..."
                rsync -a \
                    --exclude 'app/public/imgs/products/' \
                    "$NEW_RELEASE/storage/" "$SHARED/storage/"
            fi

            # Remove diretórios locais da nova release para recriar os links simbólicos
            rm -rf "$NEW_RELEASE/.env" "$NEW_RELEASE/storage" "$NEW_RELEASE/bootstrap/cache"

            # Cria os symlinks
            ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
            ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"
            ln -sfn "$SHARED/bootstrap/cache" "$NEW_RELEASE/bootstrap/cache"

            # Aplica permissões de escrita/dono
            sudo chown -R ubuntu:www-data "$SHARED/storage" "$SHARED/bootstrap/cache"
            sudo chmod -R 775 "$SHARED/storage" "$SHARED/bootstrap/cache"

            echo "✅ Permissões aplicadas e cache compartilhado limpo."

            #######################################################################
            # 4, 5, 6 e 7. Execução protegida (Banco, Migrations, Link e Limpeza)
            #######################################################################
            (
              set -Eeuo pipefail

              # 4a. Localizar container do banco
              echo "🔍 Localizando container do banco de dados..."
              CONTAINER_NAME=$(sudo docker ps --filter "name=$DB_CONTAINER_TARGET" --format "{{.Names}}" | head -1)

              if [ -z "$CONTAINER_NAME" ]; then
                  echo "❌ Erro: nenhum container encontrado com nome contendo '$DB_CONTAINER_TARGET'."
                  echo "   Verifique se 'container_name' no compose corresponde a esse valor."
                  exit 1
              fi

              DB_USER=$(grep -oP '^DB_USERNAME=\K.*' "$SHARED/.env" | head -1 || echo "postgres")

              if [ -f "$SHARED/.env.docker" ]; then
                  DB_PASS=$(grep -oP '^POSTGRES_PASSWORD=\K.*' "$SHARED/.env.docker" | head -1)
              else
                  echo "⚠️ Aviso: $SHARED/.env.docker não encontrado. Assumindo autenticação sem senha (trust/peer)."
                  DB_PASS=""
              fi

              # 4b. Esperar o Postgres aceitar conexões (evita falha logo após 'up -d')
              echo "⏳ Aguardando banco de dados ficar pronto..."
              DB_READY=0
              for i in $(seq 1 30); do
                  if sudo docker exec -e PGPASSWORD="$DB_PASS" "$CONTAINER_NAME" pg_isready -U "$DB_USER" > /dev/null 2>&1; then
                      DB_READY=1
                      break
                  fi
                  echo "   ainda não está pronto... ($i/30)"
                  sleep 2
              done

              if [ "$DB_READY" -ne 1 ]; then
                  echo "❌ Erro: banco de dados não respondeu a tempo."
                  exit 1
              fi

              echo "✅ Banco de dados pronto."

              # 4c. Backup do banco ANTES de rodar migrations — só em produção (main).
              # Em 'hom' o backup não faz sentido, pois migrate:fresh já apaga tudo.
              if [[ "${{ github.ref_name }}" == "main" ]]; then
                  echo "💾 Gerando backup do banco antes da migration..."
                  BACKUP_FILE="$BACKUPS/${PROJECT_NAME}-pre-migrate-$(date +%Y%m%d%H%M%S).dump"
                  sudo docker exec -e PGPASSWORD="$DB_PASS" "$CONTAINER_NAME" \
                      pg_dump -U "$DB_USER" -Fc postgres > "$BACKUP_FILE"
                  echo "✅ Backup salvo em $BACKUP_FILE"

                  # Mantém só os 10 backups mais recentes
                  cd "$BACKUPS" && ls -1tr ${PROJECT_NAME}-pre-migrate-*.dump 2>/dev/null | head -n -10 | xargs -r rm -f --
              else
                  echo "⏭️  Backup pulado (ambiente hom usa migrate:fresh, backup não é útil aqui)."
              fi
              
              # 5. Migrations
              echo "🚀 Rodando Migrations nativamente no servidor..."
              cd "$NEW_RELEASE"
              php artisan $MIGRATION_STRATEGY --force

              # Limpa caches antigos ANTES de recriar, evitando servir HTML/assets
              # com hashes de um build anterior (bug de view cache preso).
              php artisan optimize:clear
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              
              rm -rf public/storage
              ln -sfn "$SHARED/storage/app/public" public/storage
              
              # Recicla os workers do PHP-FPM para descartar opcache de arquivos
              # compilados do release anterior.
              sudo systemctl reload php8.5-fpm

              # 6. Ativação Atômica
              echo "🔄 Atualizando link atual..."
              sudo rm -rf "$CURRENT"
              sudo ln -sfn "$NEW_RELEASE" "$CURRENT"
              sudo chown -h ubuntu:ubuntu "$CURRENT"

              # 7. Limpeza
              echo "🧹 Limpando..."
              cd "$RELEASES" && ls -1tr | head -n -5 | xargs -d '\n' rm -rf -- || true
              rm -f "/tmp/$PROJECT_NAME.zip"
              echo "✅ Deploy concluído com sucesso!"
            ) || { echo "❌ Ocorreu um erro no bloco crítico de deploy"; exit 1; }
          DEPLOY_SCRIPT
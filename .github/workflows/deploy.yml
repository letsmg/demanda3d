name: 🚀 Deploy Demanda3D

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, bcmath, pdo_pgsql, redis

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: |
          composer install --no-interaction
          npm ci
          npm run build

      - name: Prepare Assets & Optimize
        run: |
          cp .env.example .env
          php artisan key:generate
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Create Deploy Package
        run: |
          zip -r deploy.zip . -x ".git/*" -x ".github/*" -x "node_modules/*" -x "tests/*" -x ".env*" -x "storage/framework/*" -x "storage/logs/*"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Sync Database (Dev Only)
        if: github.ref_name == 'dev'
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVER_IP }} \
          "sudo -u postgres pg_dump demanda_db | sudo -u postgres psql dev_demanda_db"

      - name: Atomic Deploy
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_NAME="demanda3d"
            ROOT="/var/www/demanda3d"
          else
            PROJECT_NAME="dev-demanda3d"
            ROOT="/var/www/dev-demanda3d"
          fi
          
          scp -o StrictHostKeyChecking=no deploy.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/${PROJECT_NAME}.zip

          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.SERVER_IP }} \
          "PROJECT_NAME=$PROJECT_NAME ROOT=$ROOT bash -s" << 'EOF'
            set -e
            RELEASES="$ROOT/releases"
            SHARED="$ROOT/shared"
            CURRENT="$ROOT/current"
            BACKUPS="$ROOT/backups"
            RELEASE=$(date +%Y%m%d%H%M%S)
            NEW_RELEASE="$RELEASES/$RELEASE"

            sudo mkdir -p "$NEW_RELEASE"
            sudo unzip -oq "/tmp/$PROJECT_NAME.zip" -d "$NEW_RELEASE"

            # Links Simbólicos
            sudo ln -sfn "$SHARED/.env" "$NEW_RELEASE/.env"
            sudo mkdir -p "$SHARED/storage/app/public"
            sudo rm -rf "$NEW_RELEASE/storage" && sudo ln -sfn "$SHARED/storage" "$NEW_RELEASE/storage"
            sudo rm -rf "$NEW_RELEASE/public/storage" && sudo ln -sfn "$SHARED/storage/app/public" "$NEW_RELEASE/public/storage"

            # Permissões
            sudo chown -R www-data:www-data "$NEW_RELEASE" "$SHARED/storage"
            sudo chmod -R 775 "$NEW_RELEASE" "$SHARED/storage"

            # Artisan & Backup
            cd "$NEW_RELEASE"
            if [ "$PROJECT_NAME" = "demanda3d" ]; then
                echo "📦 Fazendo backup de segurança..."
                sudo mkdir -p "$BACKUPS"
                sudo -u postgres pg_dump demanda_db > "$BACKUPS/backup_$(date +%Y%m%d%H%M%S).sql"
                echo "🚀 Executando migrações (Incremental)..."
                sudo -u www-data php artisan migrate --force
            else
                echo "🧪 Ambiente DEV: Resetando banco e seedando..."
                sudo -u www-data php artisan migrate:fresh --seed --force
            fi
            
            sudo -u www-data php artisan optimize

            # Troca Atômica do Link (Simultânea e segura)
            sudo ln -nfs "$NEW_RELEASE" "$CURRENT"
            sudo systemctl reload php8.5-fpm
            
            # Limpeza
            cd "$RELEASES" && ls -t | tail -n +6 | xargs -r sudo rm -rf --
            cd "$BACKUPS" && ls -t | tail -n +6 | xargs -r sudo rm -rf --
            rm -f "/tmp/$PROJECT_NAME.zip"
            echo "✅ Deploy concluído: $PROJECT_NAME"
          EOF
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://demanda-loki-dev:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  - job_name: laravel_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: laravel
          app: demanda3d
          __path__: /var/log/laravel/*.log
    pipeline_stages:
      - regex:
          expression: '^\[(?P<date>\d{4}-\d{2}-\d{2})(?: (?P<time>\d{2}:\d{2}:\d{2}))\]\s+(?P<env>\w+)\.(?P<level>\w+):\s+(?P<message>.*)'
      - labels:
          level:
          env:
      - timestamp:
          source: date
          format: 2006-01-02 15:04:05
          fallback_formats:
            - '2006-01-02'
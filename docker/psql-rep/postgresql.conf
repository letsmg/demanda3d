# =============================================
# PostgreSQL Replica (Slave) Configuration
# Demanda3D - Read-Only Hot Standby
# =============================================

# Connection
listen_addresses = '*'
port = 5432
max_connections = 100

# Replication (Hot Standby)
hot_standby = on
hot_standby_feedback = on
# primary_conninfo e primary_slot_name são configurados dinamicamente
# pelo script setup-replication.sh via postgresql.auto.conf,
# usando as variáveis do .env.docker.

# Logging
log_statement = 'none'
log_duration = off
log_line_prefix = '%t [%p-%l] %q%u@%d '
log_timezone = 'America/Sao_Paulo'

# Locale
timezone = 'America/Sao_Paulo'
datestyle = 'iso, dmy'
lc_messages = 'en_US.utf8'
lc_monetary = 'pt_BR.utf8'
lc_numeric = 'pt_BR.utf8'
lc_time = 'pt_BR.utf8'
default_text_search_config = 'pg_catalog.english'

# Performance
shared_buffers = 256MB
effective_cache_size = 768MB
maintenance_work_mem = 64MB
work_mem = 4MB
random_page_cost = 1.1
effective_io_concurrency = 200
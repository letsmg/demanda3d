services:
  # =============================================
  # PostgreSQL Master (Primary) - DEV
  # =============================================
  dev-demanda-psql:
    image: postgres:18.4-alpine
    container_name: dev-demanda-psql
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - demanda-psql-dev:/var/lib/postgresql
      - ./docker/psql/00-init-master.sh:/docker-entrypoint-initdb.d/00-init-master.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - demanda-net-dev

  # =============================================
  # PostgreSQL Slave (Replica) - DEV
  # =============================================
  dev-demanda-psql-rep:
    image: postgres:18.4-alpine
    container_name: dev-demanda-psql-rep
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - demanda-psql-rep-dev:/var/lib/postgresql
      - ./docker/psql-rep/init-replica.sh:/docker-entrypoint-initdb.d/00-init-replica.sh:ro
    depends_on:
      dev-demanda-psql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - demanda-net-dev

  # =============================================
  # Redis - DEV
  # =============================================
  dev-demanda-redis:
    image: redis:8.0-alpine
    container_name: dev-demanda-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - demanda-redis-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - demanda-net-dev

networks:
  demanda-net-dev:
    name: demanda-net-dev
    driver: bridge


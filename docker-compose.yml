services:
  # =============================================
  # PostgreSQL Master (Primary) - porta 5432
  # =============================================
  dev-demanda-psql:
    image: postgres:18.4-alpine
    container_name: dev-demanda-psql
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_INITDB_ARGS: "--locale=en_US.utf8 --data-checksums"
    ports:
      - "5434:5432"
    volumes:
      - dev_demanda_psql_data:/var/lib/postgresql
      - ./docker/psql/01-init-master.sh:/docker-entrypoint-initdb.d/00-init-master.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dev-demanda-net

  # =============================================
  # PostgreSQL Slave (Replica) - porta 5433
  # =============================================
  dev-demanda-psql-rep:
    image: postgres:18.4-alpine
    container_name: dev-demanda-psql-rep
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5435:5432"
    volumes:
      - dev_demanda_psql_rep_data:/var/lib/postgresql
      - ./docker/psql-rep/init-replica.sh:/docker-entrypoint-initdb.d/00-init-replica.sh
    depends_on:
      dev-demanda-psql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${REPL_USER:-$${POSTGRES_USER}}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - dev-demanda-net

  # =============================================
  # Redis - Cache de busca do Marketplace
  # =============================================
  dev-demanda-redis:
    image: redis:8.0-alpine
    container_name: dev-demanda-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - dev_demanda_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev-demanda-net

volumes:
  dev_demanda_psql_data:
    name: dev_demanda_psql_data
  dev_demanda_psql_rep_data:
    name: dev_demanda_psql_rep_data
  dev_demanda_redis_data:
    name: dev_demanda_redis_data

networks:
  dev-demanda-net:
    name: dev-demanda-net
    driver: bridge
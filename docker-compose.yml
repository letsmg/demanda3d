services:
  # =============================================
  # PostgreSQL Master (Primary) - DEV
  #
  # Container principal: porta 5434, banco demanda_db_dev.
  # Responsável por operações de escrita e leitura.
  # Volume em /var/lib/postgresql (padrão PG 18+ Alpine).
  # =============================================
  demanda-psql-dev:
    image: postgres:18.4-alpine
    container_name: demanda-psql-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - demanda-psql-dev:/var/lib/postgresql
      - ./docker/postgres/master/init-replication.sh:/docker-entrypoint-initdb.d/init-replication.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - demanda-net-dev

  # =============================================
  # PostgreSQL Réplica (Read-Only) - DEV
  #
  # Container independente: porta 5435, banco demanda_db_dev_repl.
  # Simula arquitetura de produção. Sem replicação física
  # (economia de RAM).
  # =============================================
  demanda-psql-rep-dev:
    image: postgres:18.4-alpine
    container_name: demanda-psql-rep-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: demanda_db_dev_repl
    ports:
      - "5435:5432"
    volumes:
      - demanda-psql-rep-dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - demanda-net-dev

  # =============================================
  # RabbitMQ - DEV (message broker assíncrono)
  #
  # RabbitMQ com plugin de management (interface web na porta 15672).
  # Porta AMQP: 5672 | Interface admin: 15672
  # Credenciais padrão: guest / guest (apenas localhost)
  # =============================================
  demanda-rabbitmq-dev:
    image: rabbitmq:3-management-alpine
    container_name: demanda-rabbitmq-dev
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - demanda-rabbitmq-dev:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - demanda-net-dev

  # =============================================
  # Redis - DEV (cache + filas + sessões)
  #
  # Redis cumpre dupla função em desenvolvimento:
  # 1. Cache padrão da aplicação (trending searches, sessões)
  # 2. Queue driver (filas de jobs em segundo plano, alertas)
  # =============================================
  demanda-redis-dev:
    image: redis:8.0-alpine
    container_name: demanda-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - demanda-redis-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - demanda-net-dev

  # =============================================
  # Go Notification Service — Microsserviço Assíncrono
  #
  # Worker em Go que escuta a fila notifications_queue
  # no Redis e processa disparos de push, e-mail e SMS.
  # Alivia o core Laravel de processamento síncrono.
  # Container ultra-leve (~8MB binário compilado).
  # =============================================
  go-notification-service:
    build:
      context: ./go-service
      dockerfile: Dockerfile
    container_name: go-notification-service-dev
    restart: unless-stopped
    environment:
      REDIS_HOST: demanda-redis-dev
      REDIS_PORT: "6379"
      NOTIFICATIONS_QUEUE: notifications_queue
    depends_on:
      demanda-redis-dev:
        condition: service_healthy
    networks:
      - demanda-net-dev

  # =============================================
  # Meilisearch — Motor de Busca Full-Text (DEV)
  #
  # Busca textual de alta performance com tolerância
  # a erros tipográficos (fuzzy search) e autocomplete.
  # Integrado com Redis (cache) + PostgreSQL (fallback).
  # =============================================
  demanda-meilisearch:
    image: getmeili/meilisearch:v1.11-alpine
    container_name: demanda-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: masterKeyLocal
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - demanda-meilisearch:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - demanda-net-dev

  # =============================================
  # Loki + Promtail — Pipeline de Logs Local
  # =============================================
  demanda-loki-dev:
    image: grafana/loki:latest
    container_name: demanda-loki-dev
    restart: unless-stopped
    user: "0:0"
    profiles:
      - grafana
    ports:
      - "3101:3100"
    command: >
      -config.file=/etc/loki/local-config.yaml
      -config.expand-env=true
    volumes:
      - demanda-loki-dev:/loki
      - ./docker/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    # healthcheck removido — imagens Loki/Promtail não possuem wget/nc
    # O Promtail depende apenas de service_started, não de healthy
    networks:
      - demanda-net-dev

  demanda-promtail-dev:
    image: grafana/promtail:latest
    container_name: demanda-promtail-dev
    restart: unless-stopped
    profiles:
      - grafana
    command: >
      -config.file=/etc/promtail/config.yml
      -config.expand-env=true
    volumes:
      - ./docker/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./storage/logs:/var/log/laravel:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      demanda-loki-dev:
        condition: service_started
    networks:
      - demanda-net-dev

  # =============================================
  # Grafana — Dashboards e Alerting Local
  #
  # ATENÇÃO: Recurso EXCLUSIVO de desenvolvimento local.
  # Em produção (Oracle Free Tier), GRAFANA_ENABLED=false.
  # =============================================
  demanda-grafana-dev:
    image: grafana/grafana:latest
    container_name: demanda-grafana-dev
    restart: unless-stopped
    profiles:
      - grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "${MAIL_HOST:-mailhog}:${MAIL_PORT:-1025}"
      GF_SMTP_FROM_ADDRESS: "grafana@demanda3d.local"
      GF_SMTP_SKIP_VERIFY: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "true"
    ports:
      - "3001:3000"
    volumes:
      - demanda-grafana-dev:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      demanda-promtail-dev:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - demanda-net-dev

volumes:
  demanda-rabbitmq-dev:
    name: demanda-rabbitmq-dev
  demanda-psql-dev:
    name: demanda-psql-dev
  demanda-psql-rep-dev:
    name: demanda-psql-rep-dev
  demanda-redis-dev:
    name: demanda-redis-dev
  demanda-meilisearch:
    name: demanda-meilisearch
  demanda-loki-dev:
    name: demanda-loki-dev
  demanda-grafana-dev:
    name: demanda-grafana-dev

networks:
  demanda-net-dev:
    name: demanda-net-dev
    driver: bridge
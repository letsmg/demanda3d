services:
  # =============================================
  # PostgreSQL Master (Primary) - DEV
  # =============================================
  demanda-psql-dev:
    image: postgres:18.4-alpine
    container_name: demanda-psql-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - demanda-psql-dev:/var/lib/postgresql
      - ./docker/psql/00-init-master.sh:/docker-entrypoint-initdb.d/00-init-master.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - demanda-net-dev

  # =============================================
  # PostgreSQL Slave (Replica) - DEV
  # =============================================
  demanda-psql-rep-dev:
    image: postgres:18.4-alpine
    container_name: demanda-psql-rep-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - demanda-psql-rep-dev:/var/lib/postgresql
      - ./docker/psql-rep/init-replica.sh:/docker-entrypoint-initdb.d/00-init-replica.sh:ro
    depends_on:
      demanda-psql-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - demanda-net-dev

  # =============================================
  # Redis - DEV
  # =============================================
  demanda-redis-dev:
    image: redis:8.0-alpine
    container_name: demanda-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - demanda-redis-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - demanda-net-dev

volumes:
  demanda-psql-dev:
    name: demanda-psql-dev
  demanda-psql-rep-dev:
    name: demanda-psql-rep-dev
  demanda-redis-dev:
    name: demanda-redis-dev

networks:
  demanda-net-dev:
    name: demanda-net-dev
    driver: bridge
